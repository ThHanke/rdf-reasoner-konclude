services:
  build:
    build: .
    volumes:
      - .:/src
      - konclude-ccache:/ccache
    working_dir: /src
    command: >
      bash -c "
        exec > >(tee build.log) 2>&1 &&
        mkdir -p dist &&
        scripts/build-raptor-wasm.sh &&
        emcmake cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache . &&
        emmake make -C build -j4 &&
        chown -R $(stat -c '%u:%g' /src) dist/
      "

  smoke-test:
    build: .
    volumes:
      - .:/src
    working_dir: /src
    command: node tests/smoke/smoke.mjs

  shell:
    build: .
    volumes:
      - .:/src
      - konclude-ccache:/ccache
    working_dir: /src
    stdin_open: true
    tty: true
    command: bash

volumes:
  konclude-ccache:
