services:
  build:
    build: .
    volumes:
      - .:/src
      - konclude-ccache:/ccache
    working_dir: /src
    command: >
      bash -c "
        mkdir -p dist &&
        scripts/apply-patches.sh &&
        scripts/build-raptor-wasm.sh &&
        emcmake cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache . &&
        emmake make -C build -j4
      "

  smoke-test:
    build: .
    volumes:
      - .:/src
    working_dir: /src
    command: node tests/smoke/smoke.mjs

  shell:
    build: .
    volumes:
      - .:/src
      - konclude-ccache:/ccache
    working_dir: /src
    stdin_open: true
    tty: true
    command: bash

volumes:
  konclude-ccache:
